<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>루센라이즈 연혁</title>



<style>
body{
    margin:0;
    font-family: Arial, sans-serif;

    /* 배경 이미지 */ 
    background-image: url("pictures/background_transparent15.jpg"); 
    background-size: cover; 
    background-position: center; 
    background-repeat: no-repeat; 

    /* 중앙 정렬 */ 
    display:flex; 
    justify-content:center; 
    align-items:center; 
    height:100vh; 
    color:white;

    position:relative;
}

body::before{
        content:"";
        position:absolute;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.45);
        z-index:-1;
    }

/* 글 영역 */
.content{
    max-width:800px;
    text-align:center;
    padding:40px;
    border-radius:8px;

    opacity:0;
    transform:translateY(30px);
    animation:fadeUp 1.2s ease forwards;
}





/* 뒤로가기 버튼 */
.back-link{
    display:block;
    margin-top:40px;
    font-size:16px;
    color:white;
    text-decoration:none;
    cursor:pointer;
    opacity:0.6;
}

.back-link:hover{
    opacity:1;
}
</style>

</head>
    

<body>
    <div class="content">
    
        <h1>회사 연혁</h1>
        <br>
        <br>
        
        
        
        <p>
            <span style="font-weight: bold; font-size:26px;">2011</span><br>
            <span style="font-weight: bold; font-size:18px;">회사 설립</span><br>
            기업명 '항진', 대표이사 이재진
        </p>

        <p>
            <span style="font-weight: bold; font-size:26px;">2026</span><br>
            <span style="font-weight: bold; font-size:18px;">회사 인수</span><br>
            기업명 '루센라이즈', 대표이사 이서현
        </p>
        
        
        <a class="back-link" onclick="history.back()">
            이전 페이지로 돌아가기>
        </a>
    
    </div>

</body>
</html>
